sonar.projectKey=iga-portal-local
sonar.projectName=IGA Portal Local
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
sonar.scm.disabled=true
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600
sonar.sources=app,components,lib,prisma,scripts
sonar.tests=app,components,lib,prisma,scripts
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx,**/*.spec.js,**/*.spec.jsx
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/*.d.ts,**/prisma/migrations/**
sonar.coverage.exclusions=**/*.d.ts,**/*.config.*,**/next-env.d.ts,**/prisma/**,**/scripts/**,app/**/*.tsx,components/**/*.tsx,app/api/**/route.ts
